name: Build and Release Binaries

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]

    - name: Build Standalone Binary with PyInstaller
      run: |
        pyinstaller --name cg --onefile codegrapher/cli.py

    - name: Rename binary (Linux)
      if: runner.os == 'Linux'
      run: mv dist/cg dist/cg-ubuntu

    - name: Rename binary (macOS)
      if: runner.os == 'macOS'
      run: mv dist/cg dist/cg-macos

    - name: Rename binary (Windows)
      if: runner.os == 'Windows'
      run: mv dist/cg.exe dist/cg-windows.exe

    - name: Upload Binary to Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/cg-*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
